<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Share</title>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
      <h1 class="h3 mb-0">Recipes</h1>
      <form id="filter-form" class="d-flex gap-2">
        <input type="search" id="search-input" class="form-control" placeholder="Search recipes...">
        <select id="category-select" class="form-select" style="max-width: 180px;">
          <option value="">All categories</option>
        </select>
      </form>
    </div>

    <div id="recipe-grid" class="row g-3">
      <!-- recipe cards get rendered here -->
    </div>
    <p id="empty-state" class="text-muted d-none">No recipes found.</p>
  </main>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
