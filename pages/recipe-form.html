<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add / Edit Recipe - Recipe Share</title>
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4" style="max-width: 640px;">
    <h1 id="form-title" class="h3 mb-4">Add recipe</h1>
    <form id="recipe-form" novalidate>
      <div class="mb-3">
        <label class="form-label" for="title">Title</label>
        <input type="text" id="title" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="category">Category</label>
        <select id="category" class="form-select" required>
          <!-- TODO: populate via getAllCategories() -->
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label" for="description">Short description</label>
        <textarea id="description" class="form-control" rows="2"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label" for="ingredients">Ingredients</label>
        <textarea id="ingredients" class="form-control" rows="4" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label" for="instructions">Instructions</label>
        <textarea id="instructions" class="form-control" rows="6" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label" for="image">Photo</label>
        <input type="file" id="image" class="form-control" accept="image/*">
      </div>
      <button type="submit" class="btn btn-primary">Save recipe</button>
    </form>
  </main>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script type="module" src="/src/pages/recipe-form.js"></script>
</body>
</html>
